<div class="flex gap-4 mb-4">
<!-- 봄 Swatch -->
<button aria-label="봄" class="relative flex-1 aspect-square rounded-card bg-theme-spring ring-2 ring-spring-text ring-offset-2 ring-offset-white focus:outline-none flex items-center justify-center transition-transform hover:scale-95">
<span class="material-symbols-outlined text-white font-bold" data-icon="check">check</span>
</button>
<!-- 여름 Swatch -->
<button aria-label="여름" class="flex-1 aspect-square rounded-card bg-theme-summer border border-black/10 focus:outline-none transition-transform hover:scale-95"></button>
