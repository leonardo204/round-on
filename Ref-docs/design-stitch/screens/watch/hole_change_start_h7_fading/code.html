<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Round-On | Hole Transition</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#ded8e0",
                        "on-tertiary-fixed-variant": "#594400",
                        "surface-bright": "#fdf7ff",
                        "tertiary-fixed-dim": "#e7c365",
                        "primary-container": "#6750a4",
                        "on-secondary-fixed-variant": "#4b4263",
                        "inverse-on-surface": "#f5eff7",
                        "surface": "#fdf7ff",
                        "primary-fixed-dim": "#cfbcff",
                        "inverse-primary": "#cfbcff",
                        "on-secondary-container": "#645a7d",
                        "outline": "#7a7582",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#322f35",
                        "outline-variant": "#cbc4d2",
                        "on-error-container": "#93000a",
                        "on-background": "#1d1b20",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#1f1635",
                        "secondary-fixed": "#e9ddff",
                        "secondary": "#63597c",
                        "on-tertiary-container": "#503d00",
                        "on-secondary": "#ffffff",
                        "tertiary": "#765b00",
                        "tertiary-container": "#c9a74d",
                        "surface-variant": "#e6e0e9",
                        "secondary-container": "#e1d4fd",
                        "on-primary-fixed": "#22005d",
                        "surface-container-highest": "#e6e0e9",
                        "surface-container-high": "#ece6ee",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "background": "#fdf7ff",
                        "surface-container": "#f2ecf4",
                        "primary-fixed": "#e9ddff",
                        "tertiary-fixed": "#ffdf93",
                        "primary": "#4f378a",
                        "secondary-fixed-dim": "#cdc0e9",
                        "on-surface-variant": "#494551",
                        "on-primary-container": "#e0d2ff",
                        "surface-container-low": "#f8f2fa",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-surface": "#1d1b20",
                        "surface-tint": "#6750a4",
                        "on-tertiary-fixed": "#241a00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "element-gap": "16px",
                        "container-padding": "24px",
                        "gutter": "12px",
                        "section-gap": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "display-hero": ["Hanken Grotesk"],
                        "data-lg": ["JetBrains Mono"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "data-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-hero": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "data-lg": ["20px", { "lineHeight": "1.0", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "data-sm": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim min-h-screen flex items-center justify-center p-8 antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Device Presentation Wrapper (Simulating Apple Watch 45mm frame) -->
<div class="relative w-[320px] h-[390px] bg-surface-container-lowest rounded-[48px] shadow-2xl overflow-hidden border-[14px] border-inverse-surface flex items-center justify-center">
<!-- Transient Screen Canvas -->
<main class="relative w-full h-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<!-- Fading Previous Hole Content (Centered) -->
<div class="absolute inset-0 flex flex-col items-center justify-center opacity-40 z-10 px-container-padding text-center">
<div class="font-display-hero text-display-hero text-on-surface">H7</div>
<div class="font-headline-md text-headline-md text-on-surface-variant mt-unit tracking-widest uppercase">Par 4</div>
</div>
<!-- Incoming Arrow Element (Partially visible on right edge) -->
<div class="absolute right-[-28px] top-1/2 -translate-y-1/2 z-20 flex items-center justify-center">
<!-- Leveraging theme primary color for accent as requested hex overrides strict theme rules -->
<span class="material-symbols-outlined font-display-hero text-display-hero text-primary" style="font-size: 80px;">east</span>
</div>
</main>
</div>
</body></html>
