<!DOCTYPE html>

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>라운드 종료 확인</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        /* Apple Watch 45mm Container Simulation */
        .watch-container {
            width: 198px;
            height: 242px;
            overflow: hidden;
            border-radius: 40px; /* Approximate watch corner radius */
            margin: 0 auto;
            position: relative;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0; /* Outer background to show the watch */
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-dim">
<div class="watch-container bg-surface flex flex-col justify-between p-4 shadow-xl border-4 border-surface-container-highest">
<!-- Header -->
<div class="flex-1 flex flex-col justify-center items-center text-center mt-2">
<span class="material-symbols-outlined text-primary mb-2" data-icon="golf_course" style="font-variation-settings: 'FILL' 1; font-size: 28px;">golf_course</span>
<h1 class="font-headline-md text-headline-md text-on-surface leading-tight tracking-tight">확실히<br/>끝낼까요?</h1>
</div>
<!-- Actions -->
<div class="flex flex-col gap-2 w-full mb-2">
<button class="w-full bg-primary text-on-primary py-3 px-4 rounded-full font-body-md text-body-md font-bold text-center active:opacity-80 transition-opacity">
                종료
            </button>
<button class="w-full bg-surface-container-high text-on-surface-variant py-3 px-4 rounded-full font-body-md text-body-md text-center active:opacity-80 transition-opacity">
                아니오
            </button>
</div>
</div>
