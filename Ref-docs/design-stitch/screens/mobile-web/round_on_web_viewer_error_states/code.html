<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Gallery of the Green - Error States</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#f2ecf4",
                        "inverse-surface": "#322f35",
                        "inverse-primary": "#cfbcff",
                        "tertiary-fixed": "#ffdf93",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f8f2fa",
                        "primary-fixed-dim": "#cfbcff",
                        "secondary-container": "#e1d4fd",
                        "primary-fixed": "#e9ddff",
                        "on-tertiary-fixed": "#241a00",
                        "inverse-on-surface": "#f5eff7",
                        "on-secondary-container": "#645a7d",
                        "on-surface-variant": "#494551",
                        "surface-variant": "#e6e0e9",
                        "on-primary-fixed": "#22005d",
                        "primary": "#4f378a",
                        "tertiary": "#765b00",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#e9ddff",
                        "outline-variant": "#cbc4d2",
                        "surface-container-highest": "#e6e0e9",
                        "surface-container-high": "#ece6ee",
                        "on-background": "#1d1b20",
                        "primary-container": "#6750a4",
                        "outline": "#7a7582",

                        "surface-tint": "#6750a4",
                        "surface-dim": "#ded8e0",

                        "background": "#fdf7ff",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#594400",
                        "secondary": "#63597c",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-secondary-fixed": "#1f1635"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",

                    "spacing": {
                        "section-gap": "48px",
                        "container-padding": "24px",
                        "unit": "8px",
                        "gutter": "12px",
                        "element-gap": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-hero": ["Hanken Grotesk"],
                        "data-sm": ["JetBrains Mono"],
                        "body-md": ["Hanken Grotesk"],
                        "data-lg": ["JetBrains Mono"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "display-hero": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],

                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]

                }
            }
        }

<style>
        body {
            /* Applying the requested spring palette text color while maintaining system tokens */
            color: #1F2A1B; 
            background-color: #FAFCF7;
        }
        .text-secondary-spring {
            color: #5D6B57;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center py-section-gap font-body-md">
<!-- Top Navigation (Shell logic: Supressed since these are terminal error states) -->
<main class="w-full max-w-screen-2xl mx-auto px-container-padding flex flex-col md:flex-row gap-section-gap justify-center items-start">
<!-- Frame A: 410 Expired -->
<article class="w-full md:w-1/3 max-w-md flex flex-col justify-center min-h-[614px] bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-container-padding relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-full -z-10"></div>
<div class="mb-element-gap flex justify-start">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center text-primary/40">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 0;">
                        grass
                    </span>
</div>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-unit">
                이 라운드는 만료되었습니다
            </h1>
<p class="font-body-md text-body-md text-secondary-spring">
                공유 링크는 생성 후 7일 동안 유효합니다.
            </p>
</article>
<!-- Frame B: 404 Not Found -->
<article class="w-full md:w-1/3 max-w-md flex flex-col justify-center min-h-[614px] bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-container-padding relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-full -z-10"></div>
<div class="mb-element-gap flex justify-start">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center text-primary/40">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 0;">
                        search_off
                    </span>
</div>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-unit">
                라운드를 찾을 수 없습니다
            </h1>
<p class="font-body-md text-body-md text-secondary-spring">
                잘못된 링크이거나 이미 회수된 라운드입니다.
            </p>
</article>
<!-- Frame C: 429 PIN Locked -->
<article class="w-full md:w-1/3 max-w-md flex flex-col justify-center min-h-[614px] bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-container-padding relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-full -z-10"></div>
<div class="mb-element-gap flex justify-start">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center text-primary/40">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 0;">
                        lock
                    </span>
</div>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-unit">
                5회 오답으로 잠금되었습니다
            </h1>
<div class="flex flex-col gap-unit">
<p class="font-body-md text-body-md text-secondary-spring">
                    1시간 후 다시 시도해 주세요.
                </p>
<div class="font-data-lg text-data-lg text-primary tracking-widest mt-2">
                    59:58
                </div>
</div>
</article>
</main>
<!-- Global Footer for Viewer States -->
<footer class="w-full py-section-gap mt-auto flex flex-col items-center justify-center px-container-padding border-t border-outline-variant/30">
<p class="font-data-sm text-data-sm text-secondary-spring text-center">
            © OpenStreetMap contributors, ODbL 1.0
        </p>
</footer>
</body></html>
