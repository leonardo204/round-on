<!DOCTYPE html>

                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#e7c365",
                        "surface-container": "#f2ecf4",

                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],

<body class="bg-background text-on-background antialiased h-screen w-screen overflow-hidden flex flex-col justify-between">
<div class="absolute inset-0 z-10 bg-[#FAFCF7]/92 backdrop-blur-md flex flex-col justify-between" id="lightbox-overlay">
<header class="flex justify-between items-center px-container-padding py-6 z-20">
<div class="font-data-sm text-data-sm text-[#5A6850]">
                3 / 12
            </div>
<button aria-label="Close lightbox" class="w-[44px] h-[44px] flex items-center justify-center text-on-surface hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center w-full px-4 overflow-hidden relative z-20">
<div class="w-full max-w-4xl max-h-[819px] flex flex-col items-center justify-center relative touch-pan-x">

<p class="mt-4 font-body-md text-body-md text-[#5A6850] text-center w-full max-w-md">
                    14th Hole, Royal County Down. Morning dew.
                </p>
</div>
<div class="absolute inset-y-0 left-0 w-1/6 z-30 cursor-pointer flex items-center justify-start px-2 opacity-0 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-4xl text-on-surface/50">chevron_left</span>
</div>
<div class="absolute inset-y-0 right-0 w-1/6 z-30 cursor-pointer flex items-center justify-end px-2 opacity-0 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-4xl text-on-surface/50">chevron_right</span>
</div>
</main>
<footer class="h-[60px] flex items-center justify-center px-container-padding z-20 bg-transparent sticky bottom-0 w-full mb-6">
<a class="flex items-center gap-2 font-body-md text-body-md text-[#1F2A1B] hover:text-primary transition-colors focus:outline-none focus:ring-1 focus:ring-primary/20 rounded px-3 py-2" href="#">
<span class="material-symbols-outlined" style="font-size: 20px;">download</span>

</a>
</footer>
</div>
