name: Courses Sync (Quarterly)

on:
  schedule:
    # 분기 1회: 3개월마다 1일 새벽 3시 UTC (= KST 12시)
    # Worker cron "0 3 1 */3 *"과 동일 시각 → Worker Cron은 noop, Action이 처리
    - cron: "0 3 1 */3 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (KV 저장 안 함, Worker 호출 안 함)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  sync:
    name: Sync Golfzon Course Pars
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync script
        env:
          WORKER_ENDPOINT: "https://golf.zerolive.co.kr"
          REFRESH_HMAC_SECRET: ${{ secrets.REFRESH_HMAC_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/sync-courses.mjs
