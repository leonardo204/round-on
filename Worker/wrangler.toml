name = "roundon-viewer"
main = "src/index.ts"
compatibility_date = "2026-05-11"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[triggers]
crons = [
  "0 3 * * *",       # 매일 새벽 3시 — 만료 회수 처리
  "0 3 1 */3 *",     # 분기(3개월)마다 1일 새벽 3시 — 코스 데이터 동기화
]

# ── Top-level bindings (로컬 dev 및 default 환경) ─────────────────
[[kv_namespaces]]
binding = "KV_META"
id = "7b78e911dd704dd29c684002b99247af"

[[kv_namespaces]]
binding = "KV_RATELIMIT"
id = "7c656f66ceef450584018031f6ad0413"

[[kv_namespaces]]
binding = "KV_PINLOCK"
id = "61235bd0592e467f812bb548488b77c9"

[[kv_namespaces]]
binding = "KV_SESSION"
id = "c80cc35640444de4b3a3eef50a554ec3"

# KV_COURSES: 코스 DB 동기화 데이터 (KV namespace ID는 wrangler kv:namespace create로 발급 후 기재)
# wrangler kv:namespace create KV_COURSES → id 확인 후 아래에 기재
[[kv_namespaces]]
binding = "KV_COURSES"
id = "420c31e0d5064377a0130f3608bd4f3b"

# KV_STATS: 통계 공유 페이로드 저장 (7일 TTL). v1 (2026-05-27).
# 별도 namespace 발급 없이 KV_META 와 동일 id 로 alias.
# shortId prefix "s_" 가 라운드 viewer 키와 충돌 방지 (사용자 결정 2026-05-27).
[[kv_namespaces]]
binding = "KV_STATS"
id = "7b78e911dd704dd29c684002b99247af"

[vars]
ENVIRONMENT = "development"
VIEWER_DOMAIN = "golf.zerolive.co.kr"

# ── Production 환경 (Worker는 env마다 bindings 명시적 상속) ─────────
# Custom Domain은 routes에 custom_domain = true 명시하면 deploy 시 자동 등록.
# (대시보드 수동 작업 불필요. DNS Worker 형식 행도 자동 생성됨)
[env.production]
workers_dev = false
routes = [
  { pattern = "golf.zerolive.co.kr",            custom_domain = true, zone_name = "zerolive.co.kr" },
  { pattern = "golf.zerolive.co.kr/v1/courses*", zone_name = "zerolive.co.kr" },
  { pattern = "golf.zerolive.co.kr/v1/course-pars*", zone_name = "zerolive.co.kr" },
]

[env.production.vars]
ENVIRONMENT = "production"
VIEWER_DOMAIN = "golf.zerolive.co.kr"

[[env.production.kv_namespaces]]
binding = "KV_META"
id = "7b78e911dd704dd29c684002b99247af"

[[env.production.kv_namespaces]]
binding = "KV_RATELIMIT"
id = "7c656f66ceef450584018031f6ad0413"

[[env.production.kv_namespaces]]
binding = "KV_PINLOCK"
id = "61235bd0592e467f812bb548488b77c9"

[[env.production.kv_namespaces]]
binding = "KV_SESSION"
id = "c80cc35640444de4b3a3eef50a554ec3"

[[env.production.kv_namespaces]]
binding = "KV_COURSES"
id = "420c31e0d5064377a0130f3608bd4f3b"

# KV_STATS: 통계 공유 페이로드 저장 (7일 TTL). v1 (2026-05-27).
# 별도 namespace 발급 없이 KV_META 와 동일 id 로 alias.
# shortId prefix "s_" 가 라운드 viewer 키와 충돌 방지.
[[env.production.kv_namespaces]]
binding = "KV_STATS"
id = "7b78e911dd704dd29c684002b99247af"

# 시크릿 (wrangler.toml에 값 기재 금지 — wrangler secret put으로 등록)
# SESSION_HMAC_KEY      : 등록 완료 (2026-05-18)
# BCRYPT_PEPPER         : 등록 완료 (2026-05-18)
# COURSES_API_KEY       : wrangler secret put COURSES_API_KEY --env production
# REFRESH_HMAC_SECRET   : wrangler secret put REFRESH_HMAC_SECRET --env production
# TELEGRAM_BOT_TOKEN    : wrangler secret put TELEGRAM_BOT_TOKEN --env production
# TELEGRAM_CHAT_ID      : wrangler secret put TELEGRAM_CHAT_ID --env production
#
# 사진 공유 기능은 2026-05-18 폐기 (개인정보보호, 비용 절감).
# R2 binding 및 PHOTO_BACKEND var 제거.
