<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Round-On</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#0F1612",
                        "surface-container-high": "#ece6ee",
                        "on-error": "#ffffff",
                        "secondary-container": "#e1d4fd",
                        "on-primary": "#0F1612",
                        "on-secondary-container": "#645a7d",
                        "primary": "#E8F0EA",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#22005d",
                        "surface": "#0F1612",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e6e0e9",
                        "on-primary-fixed-variant": "#4f378a",
                        "tertiary-fixed": "#ffdf93",
                        "on-secondary-fixed": "#1f1635",
                        "inverse-primary": "#cfbcff",
                        "primary-container": "#6750a4",
                        "on-tertiary-container": "#503d00",
                        "secondary-fixed-dim": "#cdc0e9",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#c9a74d",
                        "on-tertiary-fixed": "#241a00",
                        "surface-tint": "#6750a4",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e9ddff",
                        "secondary-fixed": "#e9ddff",
                        "on-background": "#E8F0EA",
                        "surface-container": "#f2ecf4",
                        "outline": "#7a7582",
                        "surface-dim": "#ded8e0",
                        "surface-container-low": "#f8f2fa",
                        "surface-variant": "#e6e0e9",
                        "outline-variant": "#343F37",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#e7c365",
                        "secondary": "#9AAA9F",
                        "on-surface": "#E8F0EA",
                        "primary-fixed-dim": "#cfbcff",
                        "on-surface-variant": "#9AAA9F",
                        "inverse-surface": "#322f35",
                        "inverse-on-surface": "#f5eff7",
                        "tertiary": "#765b00",
                        "surface-bright": "#fdf7ff",
                        "on-primary-container": "#e0d2ff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-secondary-fixed-variant": "#4b4263"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "24px",
                        "section-gap": "48px",
                        "gutter": "12px",
                        "element-gap": "16px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "display-hero": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "data-sm": ["JetBrains Mono"],
                        "data-lg": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "display-hero": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "data-sm": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "400" }],
                        "data-lg": ["20px", { "lineHeight": "1.0", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface h-screen w-screen flex items-center justify-center m-0 p-0 overflow-hidden font-body-md">
<!-- Apple Watch Container 198x242pt (approx 264x322px at 1.33 ratio for rendering) -->
<div class="relative w-[198px] h-[242px] bg-background flex flex-col justify-between border border-outline-variant/30">
<!-- Top Section: Hole Info & Player -->
<div class="pt-2 px-2 flex flex-col items-start gap-1">
<!-- Top Strip: H7 · Par 4 -->
<div class="text-[13px] font-medium text-secondary leading-none">
                H7 · Par 4
            </div>
<!-- Player Chip -->
<div class="h-[22px] px-3 border border-outline-variant flex items-center justify-center rounded-none mt-1">
<span class="text-[11px] text-primary leading-none">나</span>
</div>
</div>
<!-- Middle Section: Score -->
<div class="flex-grow flex flex-col items-center justify-center">
<!-- Big Number -->
<div class="text-[88px] font-bold text-primary leading-none tabular-nums tracking-tighter" style="font-family: 'Hanken Grotesk', sans-serif;">
                4
            </div>
<!-- Par Diff -->
<div class="text-[17px] font-medium text-secondary leading-none mt-1">
                +0
            </div>
</div>
<!-- Bottom Section: Penalty Row -->
<div class="h-[44px] w-full border-t border-outline-variant flex">
<!-- OB Zone -->
<button class="flex-1 flex items-center justify-center border-r border-outline-variant text-[13px] font-semibold text-primary hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors">
                OB
            </button>
<!-- 해 (Hazard) Zone -->
<button class="flex-1 flex items-center justify-center border-r border-outline-variant text-[13px] font-semibold text-primary hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors">
                해
            </button>
<!-- OK Zone -->
<button class="flex-1 flex items-center justify-center text-[13px] font-semibold text-primary hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors">
                OK
            </button>
</div>
</div>
</body></html>
