<style>

              width: 396px;
              height: 484px;

              overflow: hidden;
              position: relative;
          }

              background-image: radial-gradient(#cbc4d2 1px, transparent 1px);
              background-size: 20px 20px;
          }
      </style>

    body {

<body class="bg-surface-variant min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased">
<!-- Watch Frame Simulator -->
<main class="watch-hardware bg-surface-container-lowest">
<!-- Dot Pattern Layer -->
<div class="absolute inset-0 z-0 bg-dots opacity-30 mix-blend-multiply pointer-events-none"></div>
<!-- Canvas -->
<div class="relative z-10 w-full h-full flex flex-col justify-center items-center overflow-hidden">

<div class="absolute inset-0 flex items-center justify-center">

<span class="material-symbols-outlined text-primary" style="font-size: 96px; font-variation-settings: 'wght' 300;">arrow_right_alt</span>
</div>
<!-- Incoming Hole Indicator (Sliding in from right) -->
