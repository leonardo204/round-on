<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Penalty Input Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-primary-fixed-variant": "#4f378a",
                    "secondary": "#63597c",
                    "surface-container-low": "#f8f2fa",
                    "surface-bright": "#fdf7ff",
                    "primary-container": "#6750a4",
                    "tertiary-fixed-dim": "#e7c365",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#1d1b20",
                    "on-tertiary-fixed": "#241a00",
                    "inverse-primary": "#cfbcff",
                    "secondary-fixed": "#e9ddff",
                    "surface-dim": "#ded8e0",
                    "secondary-fixed-dim": "#cdc0e9",
                    "primary-fixed": "#e9ddff",

                    "outline": "#7a7582",
                    "surface-container": "#f2ecf4",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#1f1635",
                    "primary-fixed-dim": "#cfbcff",
                    "on-secondary-fixed-variant": "#4b4263",
                    "on-primary-fixed": "#22005d",
                    "on-primary-container": "#e0d2ff",

                    "surface-container-high": "#ece6ee"
            },
            "borderRadius": {

                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "spacing": {

                    "gutter": "12px",
                    "element-gap": "16px",
                    "section-gap": "48px",
                    "container-padding": "24px"

            "fontFamily": {
                    "body-lg": [

                    ],
                    "data-sm": [

                    ],
                    "body-md": [

                    ],
                    "headline-md": [

                    ],
                    "display-hero": [

<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim h-screen w-full flex items-end justify-center overflow-hidden relative font-body-md text-on-surface">
<!-- Dimmed Background Overlay -->
<div class="absolute inset-0 bg-on-surface/40 backdrop-blur-sm z-0"></div>
<!-- Background Content Mockup (Round-In-Progress) -->
<div class="absolute inset-0 z-[-1] p-container-padding flex flex-col pt-section-gap opacity-30">
<div class="w-full h-48 bg-surface-container rounded-xl mb-element-gap"></div>
<div class="w-full h-12 bg-surface-container rounded-lg mb-unit"></div>
<div class="w-full h-12 bg-surface-container rounded-lg"></div>
</div>
<!-- Bottom Sheet Modal -->
<div class="w-full max-w-md bg-surface rounded-t-[16px] z-10 shadow-lg border-t border-outline-variant flex flex-col pt-container-padding pb-section-gap px-container-padding transition-transform duration-300 translate-y-0">
<!-- Header -->
<div class="flex justify-between items-center mb-section-gap">
<h2 class="font-headline-md text-headline-md text-on-surface">Hole 7 페널티 입력</h2>
<button class="text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Penalty Selection Grid -->
<div class="grid grid-cols-3 gap-gutter mb-section-gap">
<!-- OB Button -->
<button class="aspect-square bg-surface-container-low border border-outline-variant rounded-xl flex flex-col items-center justify-center hover:border-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all group">
<span class="font-headline-md text-[17px] font-semibold text-on-surface group-hover:text-primary transition-colors mb-unit">OB</span>
<span class="font-data-sm text-data-sm text-on-surface-variant group-hover:text-primary transition-colors">+2</span>
</button>
<!-- Hazard Button -->
<button class="aspect-square bg-surface-container-low border border-outline-variant rounded-xl flex flex-col items-center justify-center hover:border-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all group">
<span class="font-headline-md text-[17px] font-semibold text-on-surface group-hover:text-primary transition-colors mb-unit">해저드</span>
<span class="font-data-sm text-data-sm text-on-surface-variant group-hover:text-primary transition-colors">+1</span>
</button>
<!-- OK Button -->
<button class="aspect-square bg-surface-container-low border border-outline-variant rounded-xl flex flex-col items-center justify-center hover:border-primary focus:border-primary focus:ring-1 focus:ring-primary transition-all group">
<span class="font-headline-md text-[17px] font-semibold text-on-surface group-hover:text-primary transition-colors mb-unit">OK</span>
<span class="font-data-sm text-data-sm text-on-surface-variant group-hover:text-primary transition-colors">+1</span>
</button>
</div>
<!-- History List -->
<div class="flex flex-col mb-section-gap">
<!-- List Item 1 -->
<div class="flex justify-between items-center py-element-gap border-b border-outline-variant/50">
<div class="flex items-center gap-gutter">
<span class="font-body-lg text-body-lg text-on-surface">해저드</span>
<span class="font-data-sm text-data-sm text-on-surface-variant pt-1">+1</span>
</div>
<button class="text-error hover:text-on-error-container transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- List Item 2 (Placeholder for demo) -->
<div class="flex justify-between items-center py-element-gap border-b border-outline-variant/50">
<div class="flex items-center gap-gutter">
<span class="font-body-lg text-body-lg text-on-surface">OB</span>
<span class="font-data-sm text-data-sm text-on-surface-variant pt-1">+2</span>
</div>
<button class="text-error hover:text-on-error-container transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="flex justify-center mt-auto pt-element-gap">
<button class="font-body-lg text-body-lg text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none px-container-padding py-unit">
                취소
            </button>
</div>
</div>
</body></html>
