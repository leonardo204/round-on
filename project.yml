name: RoundOn
options:
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  bundleIdPrefix: kr.zerolive.golf
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: XU8HS9JUTS  # Apple Developer Team ID (Xcode UI에서 설정한 값, project.yml에 영구 명시)

targets:
  Shared:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
    info:
      path: Shared/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.shared
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        SKIP_INSTALL: YES

  Shared-Watch:
    type: framework
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared/Models
      - path: Shared/DesignSystem
        excludes:
          - "Color+SeasonalGreen.swift"  # Asset Catalog 참조 제외 (watchOS 런타임 분리)
      - path: Shared/Haptics
      - path: Shared/Sync
      - path: Shared/ViewModels
        excludes:
          - "ShareViewModel.swift"  # UIKit 의존 (iOS 전용)
    info:
      path: Shared/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.shared.watch
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        SKIP_INSTALL: YES
        PRODUCT_NAME: Shared

  RoundOn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App-iOS
    dependencies:
      - target: Shared
        embed: true
      - target: RoundOn-Watch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon
        CODE_SIGN_ENTITLEMENTS: App-iOS/RoundOn.entitlements
        INFOPLIST_FILE: App-iOS/Info.plist
        ENABLE_PREVIEWS: YES
    info:
      path: App-iOS/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 라운드온
        CFBundleDevelopmentRegion: ko
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "라운드 사진을 첨부하여 공유 viewer에 포함할 수 있습니다."
        NSPhotoLibraryAddUsageDescription: "공유 viewer 사진을 사진 앱에 저장할 수 있습니다."
        NSHealthShareUsageDescription: "골프 라운드 운동 기록을 건강 앱에 저장합니다."
        NSHealthUpdateUsageDescription: "골프 라운드를 운동으로 기록하여 건강 앱에 저장합니다."
        NSLocationWhenInUseUsageDescription: "가까운 골프장을 자동으로 찾기 위해 현재 위치를 사용합니다."

  RoundOn-Watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App-Watch
    dependencies:
      - target: Shared-Watch
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.watchkitapp
        INFOPLIST_FILE: App-Watch/Info.plist
        SDKROOT: watchos
    info:
      path: App-Watch/Info.plist
      properties:
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: kr.zerolive.golf.roundon
        WKApplication: true

  SharedTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/SharedTests
      # KakaoVerificationService / CourseDiscoveryService 직접 테스트를 위해 소스 포함
      - path: App-iOS/Network/KakaoVerificationService.swift
      - path: App-iOS/Network/CourseDiscoveryService.swift
    info:
      path: Tests/SharedTests/Info.plist
      properties:
        CFBundleDevelopmentRegion: ko
    dependencies:
      - target: Shared
    settings:
      base:
        # CoreLocation 링킹 (KakaoVerificationService / CourseDiscoveryService CLLocation 의존)
        OTHER_LDFLAGS: "-framework CoreLocation"

  RoundOn-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App-iOS
    dependencies:
      - target: Shared
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.dev
        PRODUCT_NAME: RoundOn
        CODE_SIGN_ENTITLEMENTS: App-iOS/RoundOn.entitlements
        INFOPLIST_FILE: App-iOS/Info.plist
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
        # 카카오 REST API 키 — Secrets.xcconfig에서 주입 (로컬 전용)
        # 실 디바이스 배포 시 CI/CD 환경 변수 또는 Xcode Cloud 시크릿으로 대체
        KAKAO_REST_API_KEY: $(KAKAO_REST_API_KEY)
    info:
      path: App-iOS/Info.plist
      properties:
        # 카카오 API 키를 Info.plist에 포함 (런타임 Bundle.main 읽기용)
        KAKAO_REST_API_KEY: $(KAKAO_REST_API_KEY)

schemes:
  RoundOn:
    build:
      targets:
        RoundOn: all
        RoundOn-Watch: all
        Shared: all
        Shared-Watch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SharedTests

  RoundOn-iOS:
    build:
      targets:
        RoundOn-iOS: all
        Shared: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SharedTests

  SharedTests:
    build:
      targets:
        SharedTests: [test]
        Shared: [test]
    test:
      config: Debug
      targets:
        - SharedTests
