name: RoundOn
options:
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  bundleIdPrefix: kr.zerolive.golf
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    version: 11.13.0

settings:
  base:
    DEVELOPMENT_TEAM: XU8HS9JUTS  # Apple Developer Team ID (Xcode UI에서 설정한 값, project.yml에 영구 명시)

targets:
  Shared:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
        excludes:
          - "Resources/CoursePars"  # 별도 folder 리소스로 등록 (Swift 컴파일 제외)
          # OCR 디렉토리는 iOS 전용 — Vision 링킹이 필요하므로 Shared 타겟에만 포함
      - path: Shared/Resources/CoursePars
        type: folder                 # JSON 파일을 bundle 내 폴더 그대로 유지
    info:
      path: Shared/Info.plist
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.shared
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        SKIP_INSTALL: YES

  Shared-Watch:
    type: framework
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared/Models
      - path: Shared/DesignSystem
        excludes:
          - "Color+SeasonalGreen.swift"  # Asset Catalog 참조 제외 (watchOS 런타임 분리)
          - "ScoreDiffShape.swift"       # Color.springTextPrimary Asset Catalog 의존 — watchOS 제외
      - path: Shared/Haptics
      - path: Shared/Logging
      - path: Shared/Settings  # PenaltySettings, CourseParsCatalog (watchOS 호환)
      - path: Shared/Sync
      - path: Shared/ViewModels
        excludes:
          - "ShareViewModel.swift"      # UIKit 의존 (iOS 전용)
          - "StatsShareViewModel.swift" # ShareAPIClient 의존 (iOS 전용)
      - path: Shared/Resources/CoursePars  # 골프장별 par 사전 데이터 JSON
        type: folder
    info:
      path: Shared/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.shared.watch
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        SKIP_INSTALL: YES
        PRODUCT_NAME: Shared

  RoundOn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App-iOS
    resources:
      - path: App-iOS/PrivacyInfo.xcprivacy
    dependencies:
      - target: Shared
        embed: true
      - target: RoundOn-Watch
        embed: true
      - sdk: PhotosUI.framework
        weak: false
      - package: GoogleMobileAds
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon
        CODE_SIGN_ENTITLEMENTS: App-iOS/RoundOn.entitlements
        INFOPLIST_FILE: App-iOS/Info.plist
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"  # iPhone 전용 (iPad 멀티태스킹 orientation 요건 면제)
        # 카카오 REST API 키 — Secrets.xcconfig에서 주입 (로컬 전용)
        # CI/CD 또는 Xcode Cloud 배포 시 시크릿 환경변수로 대체
        KAKAO_REST_API_KEY: $(KAKAO_REST_API_KEY)
        # Worker /v1/courses Bearer 토큰
        ROUNDON_API_BEARER: $(ROUNDON_API_BEARER)

  RoundOn-Watch-Complication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App-Watch-Complication
    info:
      path: App-Watch-Complication/Info.plist
      properties:
        CFBundleDisplayName: RoundOn Complication
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: "1.5"
        CFBundleVersion: "7"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.watchkitapp.complications
        CODE_SIGN_STYLE: Automatic
        SDKROOT: watchos
        INFOPLIST_FILE: App-Watch-Complication/Info.plist
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_DEBUG_DYLIB_OVERRIDE: NO

  RoundOn-Watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App-Watch
    dependencies:
      - target: Shared-Watch
        embed: true
        codeSign: true
      - target: RoundOn-Watch-Complication
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.zerolive.golf.roundon.watchkitapp
        INFOPLIST_FILE: App-Watch/Info.plist
        CODE_SIGN_ENTITLEMENTS: App-Watch/RoundOnWatch.entitlements
        CODE_SIGN_STYLE: Automatic
        SDKROOT: watchos
        # Xcode 16 Preview용 .debug.dylib이 Shared.framework rpath와 불일치하여 실기기 dyld 크래시 → Watch는 Preview 비활성
        ENABLE_PREVIEWS: NO
        # Xcode 16 binary-diff debug dylib (RoundOn-Watch.debug.dylib) 자체를 비활성화
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_DEBUG_DYLIB_OVERRIDE: NO
        # @rpath 보강 (default 값 inherits — 명시로 안전 확보)
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    info:
      path: App-Watch/Info.plist
      properties:
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: kr.zerolive.golf.roundon
        WKApplication: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: "1.5"
        CFBundleVersion: "7"
        WKBackgroundModes: [workout-processing]
        NSHealthShareUsageDescription: "라운드 진행 중 화면을 켜두고 운동 시간을 기록하기 위해 건강 데이터를 사용합니다."
        NSHealthUpdateUsageDescription: "골프 라운드를 운동 기록으로 저장하기 위해 건강 데이터에 접근합니다."

  SharedTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/SharedTests
      # KakaoVerificationService / CourseDiscoveryService 직접 테스트를 위해 소스 포함
      - path: App-iOS/Network/KakaoVerificationService.swift
      - path: App-iOS/Network/CourseDiscoveryService.swift
      # ScorecardMapper / ImportGate 직접 테스트를 위해 소스 포함
      # (둘 다 App-iOS 전용 의존이 없어 테스트 타겟에서 그대로 컴파일된다)
      - path: App-iOS/Import/Mapper/ScorecardMapper.swift
      - path: App-iOS/Import/ViewModels/ImportGate.swift
    # 이미지 기반 OCR 테스트용 샘플 번들 리소스 (sources가 아닌 resources로 등록)
    resources:
      - path: Tests/SharedTests/Resources/samples
        type: folder
    info:
      path: Tests/SharedTests/Info.plist
      properties:
        CFBundleDevelopmentRegion: ko
    dependencies:
      - target: Shared
    settings:
      base:
        # CoreLocation 링킹 (KakaoVerificationService / CourseDiscoveryService CLLocation 의존)
        OTHER_LDFLAGS: "-framework CoreLocation"

schemes:
  RoundOn:
    build:
      targets:
        RoundOn: all
        RoundOn-Watch: all
        Shared: all
        Shared-Watch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SharedTests

  SharedTests:
    build:
      targets:
        SharedTests: [test]
        Shared: [test]
    test:
      config: Debug
      targets:
        - SharedTests
